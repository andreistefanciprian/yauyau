{{define "nappy_list"}}
{{if .}}
<ul class="nappy-list">
  {{range .}}
  <li>
    <span class="kind kind-{{.Kind}}">{{.Kind}}</span>
    {{if .Colour}}<span class="colour">{{.Colour}}</span>{{end}}
    <span class="time">{{.OccurredAt.Format "Mon 15:04"}}</span>
  </li>
  {{end}}
</ul>
{{else}}
<p class="empty">No nappy changes logged yet.</p>
{{end}}
{{end}}
