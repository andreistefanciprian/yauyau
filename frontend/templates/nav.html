{{define "app-nav"}}
<nav class="navbar">
  <a class="navbar-brand" href="/app" aria-label="Yauli home">
    <img src="/static/logo.png" alt="Yauli" class="navbar-logo-image">
  </a>
  <div class="navbar-actions">
    <details class="account-menu">
      <summary aria-label="Account menu">
        <svg class="account-icon" aria-hidden="true" viewBox="0 0 24 24" focusable="false">
          <path d="M20 21a8 8 0 0 0-16 0"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        <span class="account-chevron" aria-hidden="true">&#9662;</span>
      </summary>
      <div class="account-menu-panel">
        <div class="account-menu-identity">
          <span class="account-menu-label">Signed in as</span>
          {{if ne .Account.Label .Account.Email}}<span class="account-menu-email">{{.Account.Label}}</span>{{end}}
          <span class="account-menu-email">{{.Account.Email}}</span>
          <span class="account-menu-context">{{.Baby.Name}}'s timeline</span>
        </div>
        <a href="/settings">Settings</a>
        <form method="post" action="/logout">
          <button type="submit">Sign out</button>
        </form>
      </div>
    </details>
  </div>
</nav>
{{end}}
