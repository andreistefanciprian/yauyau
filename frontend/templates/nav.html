{{define "app-nav"}}
<nav class="navbar">
  <a class="navbar-brand" href="/app" aria-label="Yauli home">
    <img src="/static/yauli_logo_267_264px.png" alt="" class="navbar-logo-image">
    <span class="navbar-wordmark" aria-hidden="true"><span class="navbar-wordmark-yau">Yau</span><span class="navbar-wordmark-li">li</span></span>
  </a>
  <div class="navbar-actions">
    <details class="account-menu">
      <summary aria-label="Account menu">
        <span class="account-avatar-initial" aria-hidden="true">{{initial .Account.Label}}</span>
      </summary>
      <div class="account-menu-panel">
        <div class="account-menu-identity">
          <span class="account-menu-label">Signed in as</span>
          {{if ne .Account.Label .Account.Email}}<span class="account-menu-email">{{.Account.Label}}</span>{{end}}
          <span class="account-menu-email">{{.Account.Email}}</span>
          <span class="account-menu-context">{{.Baby.Name}}'s timeline</span>
        </div>
        <a href="/settings">Settings</a>
        <form method="post" action="/logout">
          <button type="submit">Sign out</button>
        </form>
      </div>
    </details>
  </div>
</nav>
<script>
  (() => {
    const accountMenu = document.currentScript.previousElementSibling.querySelector(".account-menu");
    if (!accountMenu) return;

    document.addEventListener("pointerdown", (event) => {
      if (!accountMenu.open || accountMenu.contains(event.target)) return;
      accountMenu.open = false;
    });

    document.addEventListener("focusin", (event) => {
      if (!accountMenu.open || accountMenu.contains(event.target)) return;
      accountMenu.open = false;
    });

    accountMenu.addEventListener("keydown", (event) => {
      if (event.key !== "Escape") return;
      accountMenu.open = false;
      accountMenu.querySelector("summary")?.focus();
    });
  })();
</script>
{{end}}
