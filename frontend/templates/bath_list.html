{{define "bath_list"}}
{{if .}}
<ul class="bath-list">
  {{range .}}
  <li>
    <span class="kind kind-{{.Type}}">{{if eq .Type "whole_body"}}whole body{{else}}bottom part{{end}}</span>
    {{if .Notes}}<span class="notes">{{.Notes}}</span>{{end}}
    {{if .DurationMinutes}}<span class="duration">{{.DurationMinutes}}min</span>{{end}}
    <span class="time">{{.OccurredAt.Format "Mon 15:04"}}</span>
  </li>
  {{end}}
</ul>
{{else}}
<p class="empty">No baths logged yet.</p>
{{end}}
{{end}}
