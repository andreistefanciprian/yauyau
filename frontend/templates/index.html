{{define "index"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yauli</title>
  <link rel="icon" type="image/png" sizes="512x512" href="/static/favicon-512x512.png">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js"></script>
  <script src="/static/app.js" defer></script>
</head>
<body>
  <nav class="navbar">
    <a class="navbar-brand" href="/" aria-label="Yauli home">
      <img src="/static/logo.png" alt="Yauli" class="navbar-logo-image">
    </a>
    <form method="post" action="/logout" class="navbar-actions">
      <button type="submit" class="navbar-text-button">Sign Out</button>
    </form>
  </nav>

  <main>
    <header class="page-header">
      <h1>{{.Baby.Name}}</h1>
    </header>

    <section id="timeline" class="timeline-section" aria-live="polite">
      {{template "timeline" .Timeline}}
    </section>

    <button type="button" class="fab" id="add-event-button" aria-haspopup="dialog" aria-controls="add-event-dialog">
      <span class="fab-plus" aria-hidden="true">+</span>
      <span>Add Event</span>
    </button>

    <dialog id="add-event-dialog" aria-labelledby="add-event-title">
      <div class="dialog-content">
      <div class="dialog-header">
        <button type="button" class="back-button" id="add-event-back" hidden>&larr; Back</button>
        <h2 id="add-event-title">Add event</h2>
        <button type="button" class="icon-button" id="add-event-close" aria-label="Close">&times;</button>
      </div>

      <div id="event-type-picker" class="event-type-picker">
        <button type="button" class="type-choice type-choice-nappy" data-type="nappy">
          <span class="type-choice-icon" aria-hidden="true">💩</span>
          <span>Nappy</span>
        </button>
        <button type="button" class="type-choice type-choice-feed" data-type="feed">
          <span class="type-choice-icon" aria-hidden="true">🍼</span>
          <span>Feed</span>
        </button>
        <button type="button" class="type-choice type-choice-bath" data-type="bath">
          <span class="type-choice-icon" aria-hidden="true">🛁</span>
          <span>Bath</span>
        </button>
        <button type="button" class="type-choice type-choice-sleep" data-type="sleep">
          <span class="type-choice-icon" aria-hidden="true">😴</span>
          <span>Sleep</span>
        </button>
        <button type="button" class="type-choice type-choice-observation" data-type="observation">
          <span class="type-choice-icon" aria-hidden="true">📝</span>
          <span>Observation</span>
        </button>
      </div>

      <form class="event-form" data-type="nappy" hx-post="/nappies" hx-target="#timeline" hx-swap="innerHTML" hx-on::after-request="if(event.detail.successful) onEventSaved()" hidden>
        <fieldset>
          <legend>Kind</legend>
          <label><input type="radio" name="kind" value="wet" required> Wet</label>
          <label><input type="radio" name="kind" value="poo"> Poo</label>
          <label><input type="radio" name="kind" value="both"> Both</label>
        </fieldset>

        <label class="field-label">
          Colour (optional)
          <input type="text" name="colour" placeholder="e.g. mustard yellow">
        </label>

        <label class="field-label">
          Date
          <input type="date" name="date" value="{{.NowDate}}" required>
        </label>

        <label class="field-label">
          Time
          <input type="time" name="time" value="{{.NowTime}}" required>
        </label>

        <button type="submit">Save</button>
      </form>

      <form class="event-form" data-type="feed" hx-post="/feeds" hx-target="#timeline" hx-swap="innerHTML" hx-on::after-request="if(event.detail.successful) onEventSaved()" hidden>
        <fieldset>
          <legend>Type</legend>
          <label><input type="radio" name="type" value="breast" required> Breast</label>
          <label><input type="radio" name="type" value="formula"> Formula</label>
          <label><input type="radio" name="type" value="expressed"> Expressed</label>
        </fieldset>

        <label class="field-label">
          Amount (ml, optional)
          <input type="number" name="amount_ml" min="0" placeholder="e.g. 70">
        </label>

        <label class="field-label">
          Duration (minutes, optional)
          <input type="number" name="duration_minutes" min="0" placeholder="e.g. 15">
        </label>

        <label class="field-label">
          Date
          <input type="date" name="date" value="{{.NowDate}}" required>
        </label>

        <label class="field-label">
          Time
          <input type="time" name="time" value="{{.NowTime}}" required>
        </label>

        <button type="submit">Save</button>
      </form>

      <form class="event-form" data-type="bath" hx-post="/baths" hx-target="#timeline" hx-swap="innerHTML" hx-on::after-request="if(event.detail.successful) onEventSaved()" hidden>
        <fieldset>
          <legend>Type</legend>
          <label><input type="radio" name="type" value="whole_body" required> Whole body</label>
          <label><input type="radio" name="type" value="bottom_part"> Bottom part</label>
        </fieldset>

        <label class="field-label">
          Notes (optional)
          <input type="text" name="notes" placeholder="e.g. used baby shampoo">
        </label>

        <label class="field-label">
          Duration (minutes, optional)
          <input type="number" name="duration_minutes" min="0" placeholder="e.g. 10">
        </label>

        <label class="field-label">
          Date
          <input type="date" name="date" value="{{.NowDate}}" required>
        </label>

        <label class="field-label">
          Time
          <input type="time" name="time" value="{{.NowTime}}" required>
        </label>

        <button type="submit">Save</button>
      </form>

      <form class="event-form" data-type="sleep" hx-post="/sleeps" hx-target="#timeline" hx-swap="innerHTML" hx-on::after-request="if(event.detail.successful) onEventSaved()" hidden>
        <fieldset>
          <legend>Type</legend>
          <label><input type="radio" name="type" value="nap" required> Nap</label>
          <label><input type="radio" name="type" value="night"> Night sleep</label>
        </fieldset>

        <label class="field-label">
          Notes (optional)
          <input type="text" name="notes" placeholder="e.g. settled easily">
        </label>

        <label class="field-label">
          Duration (minutes, optional)
          <input type="number" name="duration_minutes" min="0" placeholder="e.g. 90">
        </label>

        <label class="field-label">
          Date
          <input type="date" name="date" value="{{.NowDate}}" required>
        </label>

        <label class="field-label">
          Time
          <input type="time" name="time" value="{{.NowTime}}" required>
        </label>

        <button type="submit">Save</button>
      </form>

      <form class="event-form" data-type="observation" hx-post="/observations" hx-target="#timeline" hx-swap="innerHTML" hx-on::after-request="if(event.detail.successful) onEventSaved()" hidden>
        <label class="field-label">
          Note
          <textarea name="text" required placeholder="What did you notice?"></textarea>
        </label>

        <label class="field-label">
          Category (optional)
          <input type="text" name="category" list="observation-categories" placeholder="general">
          <datalist id="observation-categories">
            <option value="general">
            <option value="behaviour">
            <option value="feeding">
            <option value="sleep">
            <option value="health">
            <option value="doctor">
            <option value="milestone">
          </datalist>
        </label>

        <label class="field-label">
          Date
          <input type="date" name="date" value="{{.NowDate}}" required>
        </label>

        <label class="field-label">
          Time
          <input type="time" name="time" value="{{.NowTime}}" required>
        </label>

        <button type="submit">Save</button>
      </form>
      </div>
    </dialog>

    <dialog id="confirm-dialog" aria-labelledby="confirm-dialog-title">
      <div class="dialog-content confirm-dialog-content">
        <h2 id="confirm-dialog-title">Delete event</h2>
        <p id="confirm-dialog-message"></p>
        <div class="confirm-dialog-actions">
          <button type="button" class="confirm-cancel-button" id="confirm-dialog-cancel">Cancel</button>
          <button type="button" class="confirm-danger-button" id="confirm-dialog-accept">Delete</button>
        </div>
      </div>
    </dialog>
  </main>
</body>
</html>
{{end}}
