{{define "timeline"}}
{{if .Events}}
<div class="timeline">
  {{range .Events}}
  <article class="event-card event-{{.CSSClass}}">
    <div class="event-card-header">
      <span class="event-icon" aria-hidden="true">{{.Icon}}</span>
      <span class="event-type">{{.TypeLabel}}{{if .Kind}} <span class="event-kind">({{.Kind}})</span>{{end}}</span>
      <span class="event-time">{{.Time}}</span>
      <button type="button" class="event-edit" aria-label="Edit event"
        data-event-id="{{.ID}}"
        data-event-type="{{.EventType}}"
        data-date="{{.DateValue}}"
        data-time="{{.TimeValue}}"
        data-kind="{{.KindValue}}"
        data-type="{{.TypeValue}}"
        data-colour="{{.Colour}}"
        data-amount-ml="{{.AmountMl}}"
        data-duration-minutes="{{.DurationMinutes}}"
        data-notes="{{.Notes}}"
        data-text="{{.Text}}"
        data-category="{{.Category}}"
        title="Edit event">&#9998;</button>
      <button type="button" class="event-delete" aria-label="Delete event"
        hx-delete="/events/{{.ID}}?range={{$.Selected}}" hx-target="#timeline" hx-swap="innerHTML"
        hx-confirm="Delete this event?" title="Delete event">&times;</button>
    </div>
    {{if .Detail}}<div class="event-detail">{{.Detail}}</div>{{end}}
  </article>
  {{end}}
</div>
{{else}}
<p class="empty">{{.EmptyMessage}}</p>
{{end}}
{{end}}
